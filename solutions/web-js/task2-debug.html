<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Olympiad | Task 2 Object Debug Demo</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <style>
      body { margin: 0; font-family: monospace; background: #10141a; color: #e7edf3; }
      #app { position: fixed; inset: 0; }
    </style>
  </head>
  <body>
    <div id="app">
      <a-scene id="task2-scene" embedded vr-mode-ui="enabled: false" renderer="colorManagement: true">
        <a-sky color="#101820"></a-sky>
        <a-camera
          id="task2-camera"
          position="0 1.45 2.25"
          rotation="-24 0 0"
          look-controls="enabled: true; pointerLockEnabled: false; touchEnabled: true; magicWindowTrackingEnabled: false"
          wasd-controls="enabled: true; acceleration: 18"
        ></a-camera>
        <a-entity light="type: ambient; intensity: 0.85"></a-entity>
        <a-entity light="type: directional; intensity: 0.55" position="1 2 1"></a-entity>
        <a-entity id="task2-grid-layer"></a-entity>
        <a-entity id="task2-marker-layer"></a-entity>
        <a-entity id="task2-field-layer"></a-entity>
        <a-entity id="task2-object-layer"></a-entity>
      </a-scene>
    </div>
    <script type="module" src="/src/app/task2-debug.js"></script>
  </body>
</html>
