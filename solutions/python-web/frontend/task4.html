<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AR Olympiad | Task 4 Shadow Projection</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
      body {
        margin: 0;
        font-family: monospace;
        background: #10151d;
        color: #e5edf5;
      }
      #app {
        min-height: 100vh;
      }
      #controls-panel {
        position: fixed;
        top: 12px;
        left: 12px;
        width: 320px;
        max-height: calc(100vh - 24px);
        overflow: auto;
        padding: 12px;
        background: rgba(10, 14, 20, 0.92);
        border: 1px solid rgba(110, 130, 150, 0.35);
        border-radius: 10px;
        color: #e6edf3;
        font-size: 12px;
        line-height: 1.45;
        z-index: 30;
      }
      #task4-layout {
        display: grid;
        grid-template-columns: minmax(560px, 1fr) 420px;
        min-height: 100vh;
        padding-left: 356px;
      }
      #task4-stage {
        padding: 24px;
        border-right: 1px solid rgba(120, 140, 160, 0.2);
        background: linear-gradient(180deg, #111927 0%, #0b1016 100%);
      }
      #task4-json {
        margin: 0;
        padding: 24px;
        white-space: pre-wrap;
        background: #0b1016;
      }
      #scene-shell {
        margin-top: 16px;
        width: min(100%, 920px);
        border: 1px solid rgba(120, 140, 160, 0.25);
        border-radius: 10px;
        overflow: hidden;
      }
      #task4-scene {
        width: 100%;
        height: 560px;
      }
      #preview-wrapper {
        position: relative;
        margin-top: 16px;
        width: min(100%, 720px);
        aspect-ratio: 1 / 1;
        background: #111927;
        border: 1px solid rgba(120, 140, 160, 0.25);
        border-radius: 10px;
        overflow: hidden;
      }
      #frame-preview {
        width: 100%;
        height: 100%;
        object-fit: contain;
        max-width: 100%;
      }
      #field-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <section id="controls-panel">
        <div id="controls-title" style="font-weight: 700;">Task 4 Controls</div>
        <div id="controls-hint" style="margin: 8px 0 10px; opacity: 0.9;">
          Live Task 4: detect the ball, track the light marker, and build a responsive shadow with penumbra and reflection.
        </div>
        <div id="controls-status" style="margin-bottom: 10px; color: #a7f3d0;"></div>
        <div id="controls-body"></div>
      </section>

      <div id="task4-layout">
        <section id="task4-stage">
          <h2>Task 4 Shadow Projection</h2>
          <div id="scene-summary"></div>
          <div id="scene-shell">
            <a-scene
              id="task4-scene"
              embedded
              vr-mode-ui="enabled: false"
              renderer="colorManagement: true"
              arjs="sourceType: webcam; debugUIEnabled: false;"
            >
              <a-camera active="true" position="0 0 0"></a-camera>

              <a-sphere id="task4-object" radius="0.05" color="#ff8a00" visible="false"></a-sphere>
              <a-plane id="task4-penumbra" width="1" height="1" visible="false"></a-plane>
              <a-plane id="task4-umbra" width="1" height="1" visible="false"></a-plane>
              <a-plane id="task4-occlusion" width="1" height="1" visible="false"></a-plane>
              <a-plane id="task4-reflection" width="1" height="1" visible="false"></a-plane>
              <a-entity id="task4-light-ray" visible="false"></a-entity>
            </a-scene>
          </div>
          <div id="preview-wrapper">
            <img id="frame-preview" alt="Task 4 detection frame preview" />
            <svg id="field-overlay" viewBox="0 0 100 100">
              <polygon
                id="field-polygon"
                fill="rgba(59, 130, 246, 0.18)"
                stroke="#7dd3fc"
                stroke-width="0.8"
              ></polygon>
            </svg>
          </div>
        </section>

        <pre id="task4-json"></pre>
      </div>
    </div>
    <script type="module" src="/src/app/task4.js"></script>
  </body>
</html>
