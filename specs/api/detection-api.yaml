openapi: 3.0.3
info:
  title: Olympiad Detection API
  version: 0.1.0
paths:
  /health:
    get:
      summary: Health check
      responses:
        '200':
          description: Service is healthy
  /api/detect/object:
    post:
      summary: Detect object inside the field
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                frameId:
                  type: string
                fieldPose:
                  type: object
                debug:
                  type: boolean
      responses:
        '200':
          description: Object pose
          content:
            application/json:
              schema:
                type: object
                properties:
                  objectPose:
                    type: object
  /api/project/shadow:
    post:
      summary: Project shadow onto the field plane
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - fieldPose
                - lightPose
                - objectPose
      responses:
        '200':
          description: Shadow projection
          content:
            application/json:
              schema:
                type: object
                properties:
                  shadowProjection:
                    type: object
